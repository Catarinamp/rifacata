<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Eudora Siàge</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; background-color: #ffffff; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="iframeRifa" src=""></iframe>

    <script>
        // CORREÇÃO: Cole o seu link real do Google Apps Script entre as aspas abaixo
        // Certifique-se de que ele termina exatamente com /exec (sem o ?qtd=1 no final)
        const URL_MOTOR_GOOGLE = "google.com";

        window.onload = function() {
            // 1. O GitHub lê apenas a letra "q" no link ultra curto (Ex: ?q=1)
            const urlParams = new URLSearchParams(window.location.search);
            const qtd = urlParams.get('q') || '2'; 

            // 2. Monta o link do Google por trás dos panos
            const linkFinalGoogle = URL_MOTOR_GOOGLE + "?qtd=" + qtd;
            
            // 3. Carrega a rifa no iframe oculto
            const iframe = document.getElementById('iframeRifa');
            iframe.src = linkFinalGoogle;

            // 4. CAMUFLAGEM TOTAL: Remove o "?q=1" da barra de endereços do cliente imediatamente!
            if (window.history.replaceState) {
                const urlLimpa = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({ path: urlLimpa }, '', urlLimpa);
            }
        };
    </script>
</body>
</html>
