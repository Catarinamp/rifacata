<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Eudora Siàge</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; background-color: #f4f4f4; overflow: hidden; }
        .generator-container { padding: 30px; max-width: 420px; margin: 60px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; box-sizing: border-box; }
        h3 { color: #d4006f; margin-top: 0; font-size: 20px; }
        p { color: #555; font-size: 14px; margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #d4006f; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; transition: background 0.2s; }
        button:hover { background-color: #b3005c; }
        .result-box { margin-top: 25px; padding: 15px; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 6px; display: none; text-align: left; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <!-- 1. PAINEL DO MESTRE MANUAL (Só aparece se você acessar o link limpo) -->
    <div id="panelManual" class="generator-container">
        <h3>🔗 Encurtador de Rifa</h3>
        <p>Cole o link completo gerado pelo seu painel do Google:</p>
        
        <input type="text" id="linkOriginal" placeholder="google.com">

        <button onclick="gerarLinkMaximoCurto()">Encurtar e Camuflar</button>
        
        <div id="resultado" class="result-box">
            <span style="color: #2e7d32; font-weight: bold; font-size: 14px;">Link Curto Pronto:</span>
            <input type="text" id="linkPronto" readonly style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #fff; font-size: 14px; font-weight: bold; color: #333;">
            <button onclick="copiarLink()" style="background-color: #4CAF50;">Copiar para o WhatsApp</button>
        </div>
    </div>

    <!-- 2. TELA DA RIFA CAMUFLADA (Onde o cliente vai navegar) -->
    <iframe id="iframeRifa" src=""></iframe>

    <script>
        window.onload = function() {
            // Captura os parâmetros da URL reduzida (?s=ID_LONGO&q=QUANTIDADE)
            const urlParams = new URLSearchParams(window.location.search);
            const scriptId = urlParams.get('s');
            const qtd = urlParams.get('q');

            // Se o link contiver os parâmetros encurtados, abre a rifa direto e esconde o painel
            if (scriptId && qtd) {
                document.getElementById('panelManual').style.display = 'none';
                
                // Reconstrói a URL original do Google por trás dos panos usando as abreviações
                const linkFinalGoogle = "google.com" + scriptId + "/exec?qtd=" + qtd;
                
                const iframe = document.getElementById('iframeRifa');
                iframe.src = linkFinalGoogle;
                iframe.style.display = 'block';

                // CAMUFLAGEM TOTAL: Remove os parâmetros da barra de endereços do cliente imediatamente!
                if (window.history.replaceState) {
                    const urlLimpa = window.location.protocol + "//" + window.location.host + window.location.pathname;
                    window.history.replaceState({ path: urlLimpa }, '', urlLimpa);
                }
            }
        };

        function gerarLinkMaximoCurto() {
            const urlCompleta = document.getElementById('linkOriginal').value.trim();
            
            if (!urlCompleta || !urlCompleta.includes('google.com')) {
                return alert("Por favor, cole um link válido do Google Apps Script!");
            }

            try {
                // Quebra o link do Google automaticamente para extrair o ID longo e a Quantidade
                // Exemplo: google.com
                const partesUrl = urlCompleta.split('/s/');
                const idComResto = partesUrl[1].split('/exec');
                const scriptId = idComResto[0]; // Pega o ID longo
                
                // Pega a quantidade de números (?qtd=X)
                const urlObj = new URL(urlCompleta);
                const qtd = urlObj.searchParams.get('qtd') || '2';

                // Pega a URL base limta do seu GitHub Pages
                const urlBase = window.location.href.split('?')[0];
                
                // Monta o link encurtado ao máximo usando abreviações rápidas (?s=ID&q=QTD)
                const linkReduzido = urlBase + "?s=" + scriptId + "&q=" + qtd;

                document.getElementById('linkPronto').value = linkReduzido;
                document.getElementById('resultado').style.display = 'block';
            } catch (e) {
                alert("Erro ao ler o link do Google. Verifique se ele contém o ID e a quantidade correta (?qtd=).");
            }
        }

        function copiarLink() {
            const inputLink = document.getElementById('linkPronto');
            inputLink.select();
            inputLink.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Link curto copiado com sucesso!");
        }
    </script>
</body>
</html>
